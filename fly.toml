app = "sidequest-beta"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_DEBUG = "0"
  FLASK_APP = "src/app.py"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
